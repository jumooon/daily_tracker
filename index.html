<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Success Tracker</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9f9f7; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem; }
.wrap { width: 100%; max-width: 480px; }
.top-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
.main-title { font-size: 20px; font-weight: 500; color: #1a1a1a; }
.streak-badge { font-size: 12px; background: #EEEDFE; color: #3C3489; padding: 4px 12px; border-radius: 20px; font-weight: 500; }
.stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.5rem; }
.stat { background: #f1f0ec; border-radius: 8px; padding: 12px 14px; }
.stat-label { font-size: 12px; color: #888; margin-bottom: 4px; }
.stat-val { font-size: 22px; font-weight: 500; color: #1a1a1a; }
.progress-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
.progress-label { font-size: 13px; color: #888; }
.progress-count { font-size: 13px; font-weight: 500; color: #1a1a1a; }
.progress-bar-bg { height: 6px; background: #ebebeb; border-radius: 99px; overflow: hidden; margin-bottom: 1.5rem; }
.progress-bar-fill { height: 100%; border-radius: 99px; background: #1D9E75; transition: width 0.4s cubic-bezier(.4,0,.2,1); }
.success-banner { background: #E1F5EE; border: 0.5px solid #9FE1CB; border-radius: 12px; padding: 1rem 1.25rem; display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
.success-icon { width: 40px; height: 40px; border-radius: 50%; background: #1D9E75; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.success-icon i { font-size: 20px; color: white; }
.success-text { font-size: 15px; font-weight: 500; color: #085041; }
.success-sub { font-size: 12px; color: #0F6E56; margin-top: 2px; }
.task-card { background: #fff; border: 0.5px solid #e0e0e0; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 10px; cursor: pointer; display: flex; align-items: center; gap: 14px; transition: border-color 0.2s; user-select: none; }
.task-card:hover { border-color: #bbb; }
.task-card.done { background: #f6f6f4; border-color: #ddd; }
.task-icon-wrap { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.task-title { font-size: 15px; font-weight: 500; color: #1a1a1a; flex: 1; }
.task-card.done .task-title { color: #aaa; text-decoration: line-through; }
.check-circle { width: 36px; height: 36px; border-radius: 50%; border: 1.5px solid #ddd; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }
.task-card.done .check-circle { background: #1D9E75; border-color: #1D9E75; }
.check-circle i { font-size: 18px; color: #aaa; opacity: 0; }
.task-card.done .check-circle i { color: white; opacity: 1; }
.divider { border: none; border-top: 0.5px solid #e0e0e0; margin: 1.5rem 0; }
.heatmap-section { margin-top: 0; }
.heatmap-outer { display: flex; gap: 4px; align-items: flex-start; }
.dow-col { display: flex; flex-direction: column; padding-top: 18px; gap: 2px; flex-shrink: 0; }
.dow-label { width: 28px; height: 10px; font-size: 10px; color: #888; line-height: 10px; text-align: right; }
.heatmap-scroll { overflow-x: auto; }
.month-labels { position: relative; height: 16px; margin-bottom: 2px; }
.weeks-row { display: flex; gap: 2px; }
.week-col { display: flex; flex-direction: column; gap: 2px; flex-shrink: 0; }
.cell { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
.cell.empty { background: transparent; }
.cell.none { background: #ebebeb; }
.cell.partial { background: #9FE1CB; }
.cell.full { background: #1D9E75; }
.legend { display: flex; align-items: center; gap: 6px; margin-top: 8px; justify-content: flex-end; }
.legend-label { font-size: 11px; color: #888; }
.legend-cell { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
</style>
</head>
<body>
<div class="wrap">
  <div class="top-row">
    <div class="main-title" id="year-title">2026</div>
    <div class="streak-badge" id="streak-badge">🔥 0-day streak</div>
  </div>
  <div class="stats-row">
    <div class="stat"><div class="stat-label">This year</div><div class="stat-val" id="stat-total">0</div></div>
    <div class="stat"><div class="stat-label">This month</div><div class="stat-val" id="stat-month">0</div></div>
    <div class="stat"><div class="stat-label">Success rate</div><div class="stat-val" id="stat-rate">0%</div></div>
  </div>
  <div class="progress-header">
    <span class="progress-label">Today</span>
    <span class="progress-count" id="prog-count">0 / 3</span>
  </div>
  <div class="progress-bar-bg"><div class="progress-bar-fill" id="prog-bar" style="width:0%"></div></div>
  <div id="success-banner" style="display:none" class="success-banner">
    <div class="success-icon"><i class="ti ti-star"></i></div>
    <div><div class="success-text">Successful day! 🎉</div><div class="success-sub">All three goals completed</div></div>
  </div>
  <div id="tasks"></div>
  <hr class="divider">
  <div class="heatmap-section">
    <div class="heatmap-outer">
      <div class="dow-col">
        <div class="dow-label" style="visibility:hidden">x</div>
        <div class="dow-label" style="visibility:hidden">x</div>
        <div class="dow-label">Mon</div>
        <div class="dow-label" style="visibility:hidden">x</div>
        <div class="dow-label">Wed</div>
        <div class="dow-label" style="visibility:hidden">x</div>
        <div class="dow-label">Fri</div>
      </div>
      <div class="heatmap-scroll">
        <div class="month-labels" id="month-labels"></div>
        <div class="weeks-row" id="weeks-row"></div>
      </div>
    </div>
    <div class="legend">
      <span class="legend-label">Less</span>
      <div class="legend-cell" style="background:#ebebeb"></div>
      <div class="legend-cell" style="background:#9FE1CB"></div>
      <div class="legend-cell" style="background:#1D9E75"></div>
      <span class="legend-label">More</span>
    </div>
  </div>
</div>
<script>
const TASKS = [
  { id: 'exercise', icon: 'ti-run', color: '#FAEEDA', iconColor: '#BA7517', title: 'Exercise' },
  { id: 'study', icon: 'ti-book-2', color: '#EEEDFE', iconColor: '#534AB7', title: 'Study 2 hours' },
  { id: 'salad', icon: 'ti-salad', color: '#E1F5EE', iconColor: '#0F6E56', title: 'Eat a salad' },
];
const STEP = 12;
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function dayKey(d) { return 'dsi_' + d.getFullYear() + '_' + d.getMonth() + '_' + d.getDate(); }
function todayKey() { return dayKey(new Date()); }
function loadDay(k) { try { return JSON.parse(localStorage.getItem(k) || '{}'); } catch(e) { return {}; } }
function saveDay(k, s) { try { localStorage.setItem(k, JSON.stringify(s)); } catch(e) {} }
function isSuccess(s) { return s && s.exercise && s.study && s.salad; }
function calcStreak() {
  let streak = 0;
  const today = new Date();
  for (let i = 0; i < 365; i++) {
    const d = new Date(today); d.setDate(today.getDate() - i);
    const s = loadDay(dayKey(d));
    if (isSuccess(s)) { if (i === 0 || streak > 0) streak++; else break; }
    else { if (i > 0) break; }
  }
  return streak;
}
function buildHeatmap() {
  const now = new Date();
  const year = now.getFullYear();
  document.getElementById('year-title').textContent = year;
  const jan1 = new Date(year, 0, 1);
  const startDow = jan1.getDay();
  const isLeap = (year % 4 === 0 && year % 100 !== 0) || year % 400 === 0;
  const totalDays = isLeap ? 366 : 365;
  const totalWeeks = Math.ceil((totalDays + startDow) / 7);
  let totalSuccess = 0, monthSuccess = 0;
  const curMonth = now.getMonth();
  const daysPassed = Math.floor((now - jan1) / 86400000) + 1;
  const weeksRow = document.getElementById('weeks-row');
  weeksRow.innerHTML = '';
  const monthFirstWeek = {};
  for (let w = 0; w < totalWeeks; w++) {
    const wCol = document.createElement('div');
    wCol.className = 'week-col';
    for (let dow = 0; dow < 7; dow++) {
      const dayIndex = w * 7 + dow - startDow;
      const cell = document.createElement('div');
      cell.className = 'cell';
      if (dayIndex < 0 || dayIndex >= totalDays) {
        cell.classList.add('empty');
      } else {
        const d = new Date(year, 0, dayIndex + 1);
        if (d.getDate() === 1 && monthFirstWeek[d.getMonth()] === undefined) monthFirstWeek[d.getMonth()] = w;
        const s = loadDay(dayKey(d));
        const done = [s.exercise, s.study, s.salad].filter(Boolean).length;
        if (d > now) { cell.classList.add('none'); }
        else if (done === 3) { cell.classList.add('full'); totalSuccess++; if (d.getMonth() === curMonth) monthSuccess++; }
        else if (done > 0) { cell.classList.add('partial'); }
        else { cell.classList.add('none'); }
        cell.title = (d.getMonth()+1) + '/' + d.getDate() + ' — ' + done + '/3';
      }
      wCol.appendChild(cell);
    }
    weeksRow.appendChild(wCol);
  }
  const labelsEl = document.getElementById('month-labels');
  labelsEl.innerHTML = '';
  labelsEl.style.width = (totalWeeks * STEP) + 'px';
  for (let m = 0; m < 12; m++) {
    if (monthFirstWeek[m] === undefined) continue;
    const lbl = document.createElement('span');
    lbl.textContent = MONTHS[m];
    lbl.style.cssText = 'position:absolute;left:' + (monthFirstWeek[m] * STEP) + 'px;font-size:11px;color:#888;white-space:nowrap;';
    labelsEl.appendChild(lbl);
  }
  document.getElementById('stat-total').textContent = totalSuccess;
  document.getElementById('stat-month').textContent = monthSuccess;
  const rate = daysPassed > 0 ? Math.round(totalSuccess / daysPassed * 100) : 0;
  document.getElementById('stat-rate').textContent = rate + '%';
  document.getElementById('streak-badge').textContent = '🔥 ' + calcStreak() + '-day streak';
}
function renderTasks() {
  const state = loadDay(todayKey());
  const done = TASKS.filter(t => state[t.id]).length;
  document.getElementById('prog-count').textContent = done + ' / 3';
  document.getElementById('prog-bar').style.width = (done / 3 * 100) + '%';
  document.getElementById('success-banner').style.display = done === 3 ? '' : 'none';
  const tasksEl = document.getElementById('tasks');
  tasksEl.innerHTML = '';
  TASKS.forEach(function(t) {
    const checked = !!state[t.id];
    const div = document.createElement('div');
    div.className = 'task-card' + (checked ? ' done' : '');
    div.innerHTML = '<div class="task-icon-wrap" style="background:' + t.color + '"><i class="ti ' + t.icon + '" style="font-size:18px;color:' + t.iconColor + '"></i></div><div class="task-title">' + t.title + '</div><div class="check-circle"><i class="ti ti-check"></i></div>';
    div.onclick = function() {
      const s = loadDay(todayKey());
      s[t.id] = !s[t.id];
      saveDay(todayKey(), s);
      renderTasks();
      buildHeatmap();
    };
    tasksEl.appendChild(div);
  });
}
buildHeatmap();
renderTasks();
</script>
</body>
</html>
