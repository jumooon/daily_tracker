<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matrix For Successful Day</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9f9f7; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem; }
.wrap { width: 100%; max-width: 480px; }
.date-label { font-size: 13px; color: #888; margin-bottom: 4px; }
.title-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
.main-title { font-size: 20px; font-weight: 500; color: #1a1a1a; }
.streak-badge { font-size: 12px; background: #EEEDFE; color: #3C3489; padding: 4px 12px; border-radius: 20px; font-weight: 500; }
.progress-section { margin-bottom: 1.5rem; }
.progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.progress-label { font-size: 13px; color: #888; }
.progress-count { font-size: 13px; font-weight: 500; color: #1a1a1a; }
.progress-bar-bg { height: 6px; background: #ebebeb; border-radius: 99px; overflow: hidden; }
.progress-bar-fill { height: 100%; border-radius: 99px; background: #1D9E75; transition: width 0.4s cubic-bezier(.4,0,.2,1); }
.success-banner { background: #E1F5EE; border: 0.5px solid #9FE1CB; border-radius: 12px; padding: 1rem 1.25rem; display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
.success-text { font-size: 15px; font-weight: 500; color: #085041; }
.success-sub { font-size: 12px; color: #0F6E56; margin-top: 2px; }
.success-icon { width: 40px; height: 40px; border-radius: 50%; background: #1D9E75; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.success-icon i { font-size: 20px; color: white; }
.task-card { background: #fff; border: 0.5px solid #e0e0e0; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 10px; cursor: pointer; display: flex; align-items: center; gap: 14px; transition: border-color 0.2s, background 0.15s; user-select: none; }
.task-card:hover { border-color: #bbb; }
.task-card.done { background: #f6f6f4; border-color: #ddd; }
.task-icon-wrap { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.task-info { flex: 1; }
.task-title { font-size: 15px; font-weight: 500; color: #1a1a1a; margin-bottom: 2px; }
.task-desc { font-size: 12px; color: #888; }
.task-card.done .task-title { color: #aaa; text-decoration: line-through; }
.check-circle { width: 36px; height: 36px; border-radius: 50%; border: 1.5px solid #ddd; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; background: transparent; }
.task-card.done .check-circle { background: #1D9E75; border-color: #1D9E75; }
.check-circle i { font-size: 18px; color: #aaa; opacity: 0; transition: opacity 0.2s; }
.task-card.done .check-circle i { color: white; opacity: 1; }
.history-section { margin-top: 1.5rem; }
.history-title { font-size: 13px; color: #888; margin-bottom: 8px; font-weight: 500; }
.history-row { display: flex; gap: 6px; }
.day-chip { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; flex-direction: column; gap: 1px; }
.day-chip.success { background: #E1F5EE; color: #085041; }
.day-chip.fail { background: #ebebeb; color: #aaa; }
.day-chip.today { border: 1.5px solid #1D9E75; }
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="date-label" id="date-label"></div>
  <div class="title-row">
    <div class="main-title">오늘의 성공 지표</div>
    <div class="streak-badge" id="streak-badge">🔥 0일 연속</div>
  </div>
  <div class="progress-section">
    <div class="progress-header">
      <span class="progress-label">오늘 진행률</span>
      <span class="progress-count" id="prog-count">0 / 3</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="prog-bar" style="width:0%"></div>
    </div>
  </div>
  <div id="success-banner" style="display:none" class="success-banner">
    <div class="success-icon"><i class="ti ti-star"></i></div>
    <div>
      <div class="success-text">오늘 하루 성공! 🎉</div>
      <div class="success-sub">세 가지 목표를 모두 달성했어요</div>
    </div>
  </div>
  <div id="tasks"></div>
  <div class="history-section">
    <div class="history-title">이번 주 기록</div>
    <div class="history-row" id="history-row"></div>
  </div>
</div>
<script>
const TASKS = [
  { id: 'exercise', icon: 'ti-run', color: '#FAEEDA', iconColor: '#BA7517', title: '운동', desc: '오늘의 운동 완료' },
  { id: 'study', icon: 'ti-book-2', color: '#EEEDFE', iconColor: '#534AB7', title: '집중 공부 2시간', desc: '방해 없이 2시간 집중' },
  { id: 'salad', icon: 'ti-salad', color: '#E1F5EE', iconColor: '#0F6E56', title: '샐러드 먹기', desc: '건강한 한 끼 완료' },
];
function getKey() {
  const d = new Date();
  return `dsi_${d.getFullYear()}_${d.getMonth()}_${d.getDate()}`;
}
function getWeekKeys() {
  const keys = [];
  const today = new Date();
  for (let i = 6; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(today.getDate() - i);
    keys.push({ key: `dsi_${d.getFullYear()}_${d.getMonth()}_${d.getDate()}`, label: ['일','월','화','수','목','금','토'][d.getDay()], isToday: i === 0 });
  }
  return keys;
}
function load() { try { return JSON.parse(localStorage.getItem(getKey()) || '{}'); } catch(e) { return {}; } }
function save(state) { try { localStorage.setItem(getKey(), JSON.stringify(state)); } catch(e) {} }
function calcStreak() {
  let streak = 0;
  const today = new Date();
  for (let i = 0; i < 60; i++) {
    const d = new Date(today); d.setDate(today.getDate() - i);
    const k = `dsi_${d.getFullYear()}_${d.getMonth()}_${d.getDate()}`;
    try {
      const s = JSON.parse(localStorage.getItem(k) || 'null');
      if (s && s.exercise && s.study && s.salad) { if (i === 0 || streak > 0) streak++; else break; }
      else { if (i > 0) break; }
    } catch(e) { break; }
  }
  return streak;
}
function render() {
  const state = load();
  const done = TASKS.filter(t => state[t.id]).length;
  const d = new Date();
  document.getElementById('date-label').textContent = `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일`;
  document.getElementById('prog-count').textContent = `${done} / 3`;
  document.getElementById('prog-bar').style.width = (done / 3 * 100) + '%';
  document.getElementById('success-banner').style.display = done === 3 ? '' : 'none';
  const tasksEl = document.getElementById('tasks');
  tasksEl.innerHTML = '';
  TASKS.forEach(t => {
    const checked = !!state[t.id];
    const div = document.createElement('div');
    div.className = 'task-card' + (checked ? ' done' : '');
    div.innerHTML = `
      <div class="task-icon-wrap" style="background:${t.color}">
        <i class="ti ${t.icon}" style="font-size:18px;color:${t.iconColor}"></i>
      </div>
      <div class="task-info">
        <div class="task-title">${t.title}</div>
        <div class="task-desc">${t.desc}</div>
      </div>
      <div class="check-circle"><i class="ti ti-check"></i></div>
    `;
    div.onclick = () => { const s = load(); s[t.id] = !s[t.id]; save(s); render(); };
    tasksEl.appendChild(div);
  });
  document.getElementById('streak-badge').textContent = `🔥 ${calcStreak()}일 연속`;
  const historyEl = document.getElementById('history-row');
  historyEl.innerHTML = '';
  getWeekKeys().forEach(({ key, label, isToday }) => {
    let s = null;
    try { s = JSON.parse(localStorage.getItem(key) || 'null'); } catch(e) {}
    const success = s && s.exercise && s.study && s.salad;
    const chip = document.createElement('div');
    chip.className = `day-chip ${success ? 'success' : 'fail'}${isToday ? ' today' : ''}`;
    chip.innerHTML = `<span style="font-size:10px">${label}</span><i class="ti ${success ? 'ti-check' : 'ti-minus'}" style="font-size:10px"></i>`;
    historyEl.appendChild(chip);
  });
}
render();
</script>
</body>
</html>
